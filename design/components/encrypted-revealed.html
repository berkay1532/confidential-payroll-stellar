<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8"><style>
  body{margin:0;background:#08080b;color:#ededf2;font-family:ui-sans-serif,system-ui,sans-serif;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{border-radius:16px;padding:18px;border:1px solid #23232d;background:#0f0f14}
  .rev{border-color:rgba(94,234,212,.3);background:rgba(94,234,212,.04)}
  .lbl{font-size:12px;color:#8b8b97}.lbl.m{color:#5eead4}
  code{display:block;margin-top:12px;font-family:ui-monospace,monospace;font-size:12px;color:#8b8b9799;word-break:break-all}
  .amt{margin-top:12px;font-size:30px;font-weight:600;color:#5eead4;font-variant-numeric:tabular-nums}
  .sub{margin-top:8px;font-size:13px;color:#8b8b97}
</style></head><body>
  <div class="card"><div class="lbl">What the public sees on-chain</div><code>1e66dd37c6dbf0889db3e75d5210ce2f1ea268b8e0a71166…</code><div class="sub">Encrypted. Unreadable.</div></div>
  <div class="card rev"><div class="lbl m">What a key-holder sees</div><div class="amt">3,200 USDC</div><div class="sub">Decrypted with a viewing key.</div></div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><style>
  body{margin:0;background:#08080b;color:#ededf2;font-family:ui-sans-serif,system-ui,sans-serif;padding:28px}
  h3{font-size:13px;color:#8b8b97;margin:0 0 16px;font-weight:500}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .sw{border:1px solid #23232d;border-radius:14px;overflow:hidden}
  .chip{height:64px}.meta{padding:10px 12px;font-size:12px}.meta b{display:block}.hex{color:#8b8b97;font-family:ui-monospace,monospace}
</style></head><body>
  <h3>Obscura · palette</h3>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#08080b;border-bottom:1px solid #23232d"></div><div class="meta"><b>Canvas</b><span class="hex">#08080B</span></div></div>
    <div class="sw"><div class="chip" style="background:#0f0f14"></div><div class="meta"><b>Surface</b><span class="hex">#0F0F14</span></div></div>
    <div class="sw"><div class="chip" style="background:#16161d"></div><div class="meta"><b>Surface 2</b><span class="hex">#16161D</span></div></div>
    <div class="sw"><div class="chip" style="background:#7c6cf6"></div><div class="meta"><b>Violet · primary</b><span class="hex">#7C6CF6</span></div></div>
    <div class="sw"><div class="chip" style="background:#5eead4"></div><div class="meta"><b>Mint · revealed</b><span class="hex">#5EEAD4</span></div></div>
    <div class="sw"><div class="chip" style="background:#8b8b97"></div><div class="meta"><b>Muted</b><span class="hex">#8B8B97</span></div></div>
  </div>
</body></html>
